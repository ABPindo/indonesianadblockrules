name: redundant-check

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 1 * *"  # 1st of month at 00:00 UTC

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Run redundancy check against EasyList
        run: node tools/run-redundancy-check.js

      - name: Commit report if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ -f src/redundant.txt ] && [ -s src/redundant.txt ]; then
            echo "=== Redundant rules found ==="
            cat src/redundant.txt
          else
            echo "No redundant rules found."
          fi

          git add src/redundant.txt
          git diff --staged --quiet && echo "No changes." && exit 0
          git commit -m "chore: monthly redundancy check [skip ci]"
          git push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate report
        if: always()
        run: |
          echo "## Redundancy Check Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date +%Y-%m-%d)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Results" >> $GITHUB_STEP_SUMMARY
          if [ -f src/redundant.txt ] && [ -s src/redundant.txt ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat src/redundant.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "No redundant rules found." >> $GITHUB_STEP_SUMMARY
          fi
