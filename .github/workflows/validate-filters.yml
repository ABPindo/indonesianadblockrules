name: validate-filters

on:
  workflow_dispatch:
  pull_request:
    branches:
      - master
    paths:
      - src/**
  push:
    branches:
      - master
    paths:
      - src/**

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install AGLint
        run: npm install -g @adguard/aglint

      - name: Validate filters
        run: bash tools/lint.sh

      - name: Generate report
        if: always()
        run: |
          echo "## Filter Validation Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "AGLint validation completed via \`tools/lint.sh\`." >> $GITHUB_STEP_SUMMARY
