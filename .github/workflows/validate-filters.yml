name: validate-filters

on:
  workflow_dispatch:
  pull_request:
    branches:
      - master
    paths:
      - src/**
  push:
    branches:
      - master
    paths:
      - src/**

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/setup-tools
        with:
          node-packages: '@adguard/aglint'

      - name: Validate filters
        run: bash tools/lint.sh

      - name: Generate report
        if: always()
        run: |
          echo "## Filter Validation Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "AGLint validation completed via \`tools/lint.sh\`." >> $GITHUB_STEP_SUMMARY
