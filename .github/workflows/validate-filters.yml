name: validate-filters

on:
  workflow_dispatch:
  pull_request:
    branches:
      - master
    paths:
      - src/**
  push:
    branches:
      - master
    paths:
      - src/**

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Validate filter syntax
        run: python tools/validate_filters.py src/

      - name: Validate with strict mode (warnings as errors)
        if: github.event_name == 'pull_request'
        run: python tools/validate_filters.py --strict src/

      - name: Generate validation report
        if: always()
        run: |
          python tools/validate_filters.py --json src/ > validation-report.json
          echo "## Filter Validation Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat validation-report.json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
