name: validate-filters

on:
  workflow_dispatch:
  pull_request:
    branches:
      - master
    paths:
      - src/**
  push:
    branches:
      - master
    paths:
      - src/**

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install AGLint
        run: npm install -g @adguard/aglint

      - name: Validate filters
        run: aglint 'src/**/*.txt'

      - name: Generate report
        if: always()
        run: |
          echo "## Filter Validation Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "AGLint validation completed." >> $GITHUB_STEP_SUMMARY
