name: 'Setup ABPindo Tools'
description: 'Install tools needed for ABPindo linting, building, and dead domain management'

inputs:
  python:
    description: 'Install Python tools (python-abp)'
    default: 'false'
  node-packages:
    description: 'Comma-separated npm packages to install globally (e.g. "aglint,fop-cli")'
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      if: inputs.python == 'true'
      uses: actions/setup-python@v6
      with:
        python-version: '3.x'

    - name: Install Python tools
      if: inputs.python == 'true'
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install python-abp

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 'lts/*'

    - name: Install global npm packages
      if: inputs.node-packages != ''
      shell: bash
      run: |
        IFS=',' read -ra PACKAGES <<< "${{ inputs.node-packages }}"
        for pkg in "${PACKAGES[@]}"; do
          pkg=$(echo "$pkg" | xargs)  # trim whitespace
          echo "Installing $pkg..."
          npm install -g "$pkg"
        done
